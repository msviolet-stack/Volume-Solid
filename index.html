<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume Explorer</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#eef3f8;
}

header {
  padding:12px 20px;
  background:white;
  border-bottom:1px solid #ddd;
}

h1 { margin:0; font-size:22px; }

.viewer-note{
  position:absolute;
  top:12px;
  left:12px;
  background:white;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
  white-space:nowrap;
}

canvas { width:100%; height:100%; display:block; }
.container { display:flex; }
.left { flex:3; height:600px; position:relative; }
.right { flex:2; padding:20px; background:white; }

button { padding:8px 12px; margin:5px; }
</style>
</head>

<body>

<header>
<h1>Volume Explorer</h1>
</header>

<div class="container">
<div class="left">
<canvas id="scene"></canvas>
<div class="viewer-note">
<b>Drag to rotate.</b> Scroll to zoom. Click a cube to detach / reattach.
</div>
</div>

<div class="right">
<h2 id="title"></h2>
<p id="question"></p>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const INTERNAL_COLOR = 0xffffff;

const COLORS = [
  0x4d96ff,
  0xff8fab,
  0x51cf66,
  0xffb347,
  0xa78bfa
];

function generate(w,h,d){
  const arr=[];
  for(let x=0;x<w;x++)
  for(let y=0;y<h;y++)
  for(let z=0;z<d;z++)
    arr.push({x,y,z});
  return arr;
}

const questions=[
{
id:1,
title:"P6 Worksheet 11A Q9",
text:"Three cubes are glued together...",
cubes:[
{x:0,y:0,z:0},
{x:0,y:0,z:1},
{x:1,y:0,z:1}
]
},
{
id:2,
title:"PSLE Practice Paper",
text:"Hassan had a rectangular block...",
cubes:generate(6,9,6)
}
];

let current=1;
let detached=[];

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf4f8ff);

const camera=new THREE.PerspectiveCamera(45,1,0.1,1000);
camera.position.set(10,8,10);

const renderer=new THREE.WebGLRenderer({canvas:sceneCanvas,antialias:true});
const canvas=document.getElementById("scene");
renderer.setSize(canvas.clientWidth,canvas.clientHeight);

const controls=new THREE.OrbitControls(camera,renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,30,20);
scene.add(light);

const group=new THREE.Group();
scene.add(group);

function getMaterials(c,set,color){

  const q=questions[current-1];

  const xs=q.cubes.map(c=>c.x);
  const ys=q.cubes.map(c=>c.y);
  const zs=q.cubes.map(c=>c.z);

  const minX=Math.min(...xs);
  const maxX=Math.max(...xs);
  const minY=Math.min(...ys);
  const maxY=Math.max(...ys);
  const minZ=Math.min(...zs);
  const maxZ=Math.max(...zs);

  const has=(x,y,z)=>set.has(`${x},${y},${z}`);

  const right = (c.x===maxX || !has(c.x+1,c.y,c.z)) ? color : INTERNAL_COLOR;
  const left  = (c.x===minX || !has(c.x-1,c.y,c.z)) ? color : INTERNAL_COLOR;

  // 🔥 FIX: TOP ALWAYS PINK FOR SIM 2
  const top = (current===2 && c.y===maxY)
    ? color
    : ((c.y===maxY || !has(c.x,c.y+1,c.z)) ? color : INTERNAL_COLOR);

  const bottom = (c.y===minY || !has(c.x,c.y-1,c.z)) ? color : INTERNAL_COLOR;
  const front  = (c.z===maxZ || !has(c.x,c.y,c.z+1)) ? color : INTERNAL_COLOR;
  const back   = (c.z===minZ || !has(c.x,c.y,c.z-1)) ? color : INTERNAL_COLOR;

  return [
    new THREE.MeshLambertMaterial({color:right}),
    new THREE.MeshLambertMaterial({color:left}),
    new THREE.MeshLambertMaterial({color:top}),
    new THREE.MeshLambertMaterial({color:bottom}),
    new THREE.MeshLambertMaterial({color:front}),
    new THREE.MeshLambertMaterial({color:back})
  ];
}

function build(preserve=true){

  while(group.children.length){
    const o=group.children[0];
    group.remove(o);
  }

  const q=questions[current-1];
  const color=COLORS[current-1];
  const set=new Set(q.cubes.map(c=>`${c.x},${c.y},${c.z}`));

  q.cubes.forEach((c,i)=>{

    const geo=new THREE.BoxGeometry(1,1,1);
    const mesh=new THREE.Mesh(geo,getMaterials(c,set,color));

    let x=c.x, y=c.y, z=c.z;

    if(detached.includes(i)){
      x+=2; y+=2; z+=2;
    }

    mesh.position.set(x,y,z);
    mesh.userData.index=i;

    group.add(mesh);
  });

  if(!preserve){
    camera.position.set(10,8,10);
    controls.update();
  }
}

function updateUI(){
  const q=questions[current-1];
  document.getElementById("title").innerText=q.title;
  document.getElementById("question").innerText=q.text;
}

function next(){
  if(current<questions.length){
    current++;
    detached=[];
    build(false);
    updateUI();
  }
}

function prev(){
  if(current>1){
    current--;
    detached=[];
    build(false);
    updateUI();
  }
}

canvas.addEventListener("click",(e)=>{

  const rect=canvas.getBoundingClientRect();
  const mouse=new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );

  const ray=new THREE.Raycaster();
  ray.setFromCamera(mouse,camera);

  const hits=ray.intersectObjects(group.children);

  if(hits.length){
    const idx=hits[0].object.userData.index;

    if(detached.includes(idx)){
      detached=detached.filter(i=>i!==idx);
    } else {
      detached.push(idx);
    }

    build(true); // 🔥 KEEP ZOOM
  }
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}

build(false);
updateUI();
animate();

</script>
</body>
</html>
